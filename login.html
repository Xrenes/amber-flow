<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amber Flow — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-0: #0b0b10;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f8;
      --text-dim: rgba(240,240,248,0.5);
      --accent: #ff7a18;
      --accent-2: #ffb347;
      --radius: 16px;
    }
    body {
      min-height: 100vh;
      background: var(--bg-0);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,122,24,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(19,19,30,0.98);
      border: 1px solid rgba(255,122,24,0.2);
      border-radius: 24px;
      padding: 36px 32px 32px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,122,24,0.06) inset;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 30px;
    }
    .logo-img { width: 42px; height: 42px; border-radius: 11px; }
    .logo-text h1 {
      font-size: 19px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-text p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: rgba(255,122,24,0.15);
      color: var(--accent-2);
    }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form.hidden { display: none; }
    label { display: flex; flex-direction: column; gap: 6px; }
    label > span {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
    }
    input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: rgba(255,122,24,0.5); }
    input::placeholder { color: var(--text-dim); }
    .primary-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #000;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .primary-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .primary-btn:active { transform: translateY(0); }
    .primary-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .status {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      text-align: center;
      display: none;
      line-height: 1.4;
    }
    .status.error   { display: block; background: rgba(255,79,79,0.1);  color: #ff6b6b; border: 1px solid rgba(255,79,79,0.2); }
    .status.success { display: block; background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
    .status.info    { display: block; background: rgba(255,122,24,0.1); color: var(--accent-2); border: 1px solid rgba(255,122,24,0.2); }
    .hint { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 6px; line-height: 1.5; }
    .hint a { color: var(--accent-2); text-decoration: none; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo-row">
      <img src="logo.png" alt="Amber Flow" class="logo-img" onerror="this.style.display='none'" />
      <div class="logo-text">
        <h1>Amber Flow</h1>
        <p>Your work, in one place</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin">Sign In</button>
      <button class="tab" id="tabRegister">Register</button>
    </div>

    <div id="statusMsg" class="status"></div>

    <!-- Sign In -->
    <div class="form" id="loginForm">
      <label>
        <span>Email</span>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
      </label>
      <button class="primary-btn" id="loginBtn">Sign In</button>
    </div>

    <!-- Register -->
    <div class="form hidden" id="registerForm">
      <label>
        <span>Your Name</span>
        <input type="text" id="regName" placeholder="e.g. Alex" maxlength="40" autocomplete="name" />
      </label>
      <label>
        <span>Email</span>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" id="regPassword" placeholder="Minimum 8 characters" autocomplete="new-password" />
      </label>
      <label>
        <span>WhatsApp Number <em style="font-style:normal;opacity:.6">(optional, with country code)</em></span>
        <input type="tel" id="regPhone" placeholder="e.g. +447911123456" autocomplete="tel" />
      </label>
      <button class="primary-btn" id="registerBtn">Create Account</button>
      <p class="hint">Already have an account? <a href="#" id="switchToLogin">Sign in</a></p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    _supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    const statusEl = document.getElementById('statusMsg');
    function showMsg(text, type) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + type;
    }
    function clearMsg() { statusEl.className = 'status'; }

    // Tab switching
    function showLogin() {
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabRegister').classList.remove('active');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      clearMsg();
    }
    function showRegister() {
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('tabLogin').classList.remove('active');
      document.getElementById('registerForm').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      clearMsg();
    }
    document.getElementById('tabLogin').addEventListener('click', showLogin);
    document.getElementById('tabRegister').addEventListener('click', showRegister);
    document.getElementById('switchToLogin').addEventListener('click', e => { e.preventDefault(); showLogin(); });

    // Sign In
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg(error.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In';
      } else {
        window.location.href = 'index.html';
      }
    });

    // Enter key on login
    ['loginEmail', 'loginPassword'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
      });
    });

    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const name     = document.getElementById('regName').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const phone    = document.getElementById('regPhone').value.trim();

      if (!name)     { showMsg('Please enter your name.', 'error'); return; }
      if (!email)    { showMsg('Please enter your email.', 'error'); return; }
      if (!password) { showMsg('Please choose a password.', 'error'); return; }
      if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      const { data, error } = await _supabase.auth.signUp({
        email,
        password,
        options: { data: { name, whatsapp_number: phone } }
      });

      if (error) {
        showMsg(error.message, 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
        return;
      }

      if (data.session) {
        // Email confirmation disabled — logged in immediately
        window.location.href = 'index.html';
      } else {
        // Email confirmation enabled — ask user to check email
        showMsg('Account created! Check your email to confirm, then sign in.', 'success');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
