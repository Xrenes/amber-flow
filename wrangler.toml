name = "amber-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

# Cron: daily at 9:00 AM UTC
[triggers]
crons = ["0 9 * * *"]

# Secrets (set via: wrangler secret put <NAME>):
#   TELEGRAM_BOT_TOKEN  — your @BotFather token
#   ADMIN_CHAT_ID       — admin's Telegram Chat ID (receives all activity alerts)

# After running `wrangler kv:namespace create "AMBER_KV"`, paste the returned
# id and preview_id below.
[[kv_namespaces]]
binding = "AMBER_KV"
id = "4f596270d23649f69558d0694883ee0a"
preview_id = "4f596270d23649f69558d0694883ee0a"
