name = "amber-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

# Cron: daily at 9:00 AM UTC
[triggers]
crons = ["0 9 * * *"]

# After running `wrangler kv:namespace create "AMBER_KV"`, paste the returned
# id and preview_id below.
[[kv_namespaces]]
binding = "AMBER_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"
