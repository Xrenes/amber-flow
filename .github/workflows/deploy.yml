name: Deploy Amber Flow

on:
  push:
    branches: [master]

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set INTERNAL_USERS secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo '${{ secrets.INTERNAL_USERS }}' | npx wrangler secret put INTERNAL_USERS --name amber-worker

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: e1daac85375e898cbd8933c9757a032b
          workingDirectory: "."
